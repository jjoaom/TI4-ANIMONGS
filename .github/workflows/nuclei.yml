name: Nuclei

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dast:
    name: Nuclei
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: docker compose -f scripts/docker-compose.ci.yml up -d

      - name: Wait for backend
        run: |
          timeout 60 bash -c \
            'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'

      - name: Nuclei Scan
        id: nuclei_scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          version: latest
          config: |
            target:
              - http://localhost:8080
            tags:
              - spring
              - actuator
              - exposure
              - misconfig
              - cve
            severity:
              - medium
              - high
              - critical
            sarif-export: nuclei-results.sarif

      - name: Upload Nuclei SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: steps.nuclei_scan.outputs.sarif_exists == 'true'
        with:
          sarif_file: nuclei-results.sarif
          category: nuclei

      - name: Teardown
        if: always()
        run: docker compose -f scripts/docker-compose.ci.yml down