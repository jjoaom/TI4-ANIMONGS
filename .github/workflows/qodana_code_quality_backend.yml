name: Qodana - Backend
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
  push:
    branches:
      - main
      - 'releases/*'
    paths:
      - 'backend/**'

jobs:
  qodana-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Qodana Scan - Backend Kotlin
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
          use-caches: true
          cache-dir: .qodana/cache
          args: |
            --project-dir
            backend
            --linter
            qodana-jvm
            --within-docker
            true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_662540184 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'